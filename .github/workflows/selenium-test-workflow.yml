name: Java Selenium Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # Allows manual triggering

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
      
    - name: Set up JDK
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven
        
    - name: Verify Java version
      run: |
        java -version
        javac -version
        echo "JAVA_HOME=$JAVA_HOME"
        
    - name: Install Chrome
      run: |
        wget -q -O - https://dl-ssl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
        sudo sh -c 'echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" >> /etc/apt/sources.list.d/google.list'
        sudo apt-get update
        sudo apt-get install -y google-chrome-stable
        
    - name: Check Chrome version
      run: google-chrome --version
        
    - name: Build with Maven
      run: |
        # Set Chrome WebDriver properties for Selenium
        echo "Setting up Chrome WebDriver properties"
        export DISPLAY=:99
        sudo Xvfb :99 -screen 0 1280x1024x24 > /dev/null 2>&1 &
        
        # Run Maven with test failure ignore
        mvn -B clean verify \
          -Dmaven.test.failure.ignore=true \
          -Dwebdriver.chrome.driver=/usr/local/bin/chromedriver \
          -Dwebdriver.chrome.args="--no-sandbox --headless --disable-gpu --disable-dev-shm-usage"
      
    - name: Upload test reports
      uses: actions/upload-artifact@v4
      if: always()  # This ensures reports are uploaded even if tests fail
      with:
        name: test-reports
        path: |
          target/surefire-reports/
          target/failsafe-reports/
          **/screenshots/
          **/logs/
          
    - name: Report Test Status
      if: always()
      run: |
        echo "Test Results Summary:"
        find target/surefire-reports -name "*.txt" | xargs cat || echo "No test summary found"